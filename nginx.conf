# =============================================================================
# 0xdeadbeef.in
# Complete NGINX configuration
#
# Expected repository location relative to the NGINX installation:
#
#   html/0xdeadbeef.in/
#
# Primary files:
#
#   html/0xdeadbeef.in/index.html
#   html/0xdeadbeef.in/404.html
#   html/0xdeadbeef.in/static/
#   html/0xdeadbeef.in/landing-page/
#   html/0xdeadbeef.in/home/
#
# Change only the "root" paths if the repository is stored elsewhere.
# =============================================================================

worker_processes auto;

error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include mime.types;

    default_type application/octet-stream;

    charset utf-8;

    types {
        application/json json map;
        application/manifest+json webmanifest;
        application/pgp-keys asc pgp;
        application/javascript js mjs;
        text/css css;
        text/html html htm;
        text/markdown md markdown;
        text/plain txt;
        audio/mpeg mp3;
        audio/ogg ogg oga;
        audio/wav wav;
        audio/flac flac;
        image/png png;
        image/jpeg jpg jpeg;
        image/gif gif;
        image/webp webp;
        image/x-icon ico;
        image/svg+xml svg;
        application/pdf pdf;
        application/zip zip;
        application/gzip gz;
        application/x-tar tar;
        application/wasm wasm;
    }

    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time';

    access_log logs/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    reset_timedout_connection on;
    client_header_timeout 15s;
    client_body_timeout 15s;
    send_timeout 30s;

    client_max_body_size 16m;

    server_tokens off;

    etag on;

    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;

    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/wasm
        application/xml
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/csv
        text/javascript
        text/markdown
        text/plain
        text/xml;

    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   30d;
        application/javascript     30d;
        application/json           epoch;
        application/manifest+json  1d;
        image/png                  30d;
        image/jpeg                 30d;
        image/gif                  30d;
        image/webp                 30d;
        image/x-icon               30d;
        image/svg+xml              30d;
        audio/mpeg                 30d;
        audio/ogg                  30d;
        audio/wav                  30d;
        audio/flac                 30d;
        font/woff                  30d;
        font/woff2                 30d;
        application/pdf            7d;
    }

    # -------------------------------------------------------------------------
    # HTTP canonical redirect
    # -------------------------------------------------------------------------

    server {
        listen 80;
        listen [::]:80;

        server_name
            0xdeadbeef.in
            www.0xdeadbeef.in;

        return 301 https://0xdeadbeef.in$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS www canonical redirect
    # -------------------------------------------------------------------------

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name www.0xdeadbeef.in;

        ssl_certificate     conf/ssl/0xdeadbeef.in/fullchain.pem;
        ssl_certificate_key conf/ssl/0xdeadbeef.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        return 301 https://0xdeadbeef.in$request_uri;
    }

    # -------------------------------------------------------------------------
    # Primary site
    # -------------------------------------------------------------------------

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name 0xdeadbeef.in;

        root html/0xdeadbeef.in;
        index index.html;

        ssl_certificate     conf/ssl/0xdeadbeef.in/fullchain.pem;
        ssl_certificate_key conf/ssl/0xdeadbeef.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_prefer_server_ciphers off;

        # ---------------------------------------------------------------------
        # Security and privacy headers
        # ---------------------------------------------------------------------

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(self), battery=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), usb=(), web-share=(self)" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate" always;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # The current site references its own scripts, CSS, images, audio,
        # manifests, Bitcoin URIs, mailto links, and selected HTTPS resources.
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob:; font-src 'self' data:; connect-src 'self' https://zzx-labs.io; manifest-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; upgrade-insecure-requests" always;

        # ---------------------------------------------------------------------
        # Access and error logs
        # ---------------------------------------------------------------------

        access_log logs/0xdeadbeef.in-access.log main;
        error_log logs/0xdeadbeef.in-error.log warn;

        # ---------------------------------------------------------------------
        # Custom error pages
        # ---------------------------------------------------------------------

        error_page 400 /404.html;
        error_page 401 /404.html;
        error_page 403 /404.html;
        error_page 404 /404.html;

        location = /404.html {
            internal;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ---------------------------------------------------------------------
        # Root
        #
        # The root index.html remains responsible for forwarding first-time
        # visitors to /landing-page/.
        # ---------------------------------------------------------------------

        location = / {
            try_files /index.html =404;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location = /index.html {
            try_files $uri =404;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ---------------------------------------------------------------------
        # Directory normalization
        #
        # Existing directories receive canonical trailing slashes automatically.
        # ---------------------------------------------------------------------

        location / {
            try_files $uri $uri/ =404;
        }

        # ---------------------------------------------------------------------
        # Shared HTML includes
        #
        # header.html, nav.html, and footer.html must always reflect the latest
        # deployed version and must not be cached aggressively.
        # ---------------------------------------------------------------------

        location ^~ /static/html/ {
            try_files $uri =404;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # JavaScript
        # ---------------------------------------------------------------------

        location ^~ /static/js/ {
            try_files $uri =404;

            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location = /static/script.js {
            try_files $uri =404;

            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # CSS and design-system resources
        # ---------------------------------------------------------------------

        location = /static/styles.css {
            try_files $uri =404;

            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location = /static/colors.json {
            try_files $uri =404;

            default_type application/json;

            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Manifest JSON
        #
        # Manifest data changes independently of the HTML and should not remain
        # stale in browser or proxy caches.
        # ---------------------------------------------------------------------

        location ~* /manifest\.json$ {
            try_files $uri =404;

            default_type application/json;

            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location = /site.webmanifest {
            try_files $uri =404;

            default_type application/manifest+json;

            expires 1d;
            add_header Cache-Control "public, max-age=86400, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Audio
        #
        # Byte-range support is required for browser media seeking and reliable
        # looping. NGINX supports ranges for static files by default.
        # ---------------------------------------------------------------------

        location ^~ /static/audio/ {
            try_files $uri =404;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            add_header Accept-Ranges "bytes" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Images
        # ---------------------------------------------------------------------

        location ^~ /static/images/ {
            try_files $uri =404;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Fonts
        #
        # Font files remain local site assets. Access does not imply permission
        # to redistribute the underlying files.
        # ---------------------------------------------------------------------

        location ^~ /static/fonts/ {
            try_files $uri =404;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            add_header Access-Control-Allow-Origin "https://0xdeadbeef.in" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # OpenPGP public keys
        # ---------------------------------------------------------------------

        location ~* \.(asc|pgp)$ {
            try_files $uri =404;

            default_type application/pgp-keys;

            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header Content-Disposition "inline" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Plaintext, Markdown, PDF, and downloadable documentation
        # ---------------------------------------------------------------------

        location ~* \.(txt|md|markdown)$ {
            try_files $uri =404;

            charset utf-8;

            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location ~* \.pdf$ {
            try_files $uri =404;

            expires 7d;
            add_header Cache-Control "public, max-age=604800, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Blog plaintext posts
        # ---------------------------------------------------------------------

        location ~* ^/blog/blog_posts/post_[0-9]+/post\.txt$ {
            try_files $uri =404;

            default_type text/plain;
            charset utf-8;

            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------------------------------------------------------------------
        # Prevent exposure of repository, development, backup, and secret files
        # ---------------------------------------------------------------------

        location ~ /\.(?!well-known/) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* ^/(?:tools|tests?|docs-private|private|secrets?|backups?|tmp|temp|node_modules|vendor)/ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(?:bak|backup|old|orig|save|swp|swo|tmp|temp|log|lock|pid|sql|sqlite|sqlite3|db|env|ini|conf|config|yml|yaml|toml|pem|key|crt|csr|p12|pfx|jks|keystore)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* /(?:package-lock\.json|composer\.lock|poetry\.lock|requirements(?:-[^/]+)?\.txt|Pipfile(?:\.lock)?|Cargo\.lock|go\.sum)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* /(?:README|CHANGELOG|CONTRIBUTING|SECURITY|CODE_OF_CONDUCT|FUNDING|Dockerfile|docker-compose)(?:\.[^/]*)?$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ---------------------------------------------------------------------
        # ACME certificate validation
        # ---------------------------------------------------------------------

        location ^~ /.well-known/acme-challenge/ {
            root html/acme;
            default_type text/plain;
            allow all;
            try_files $uri =404;
        }

        # ---------------------------------------------------------------------
        # Reject unsupported methods
        # ---------------------------------------------------------------------

        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }
    }
}
